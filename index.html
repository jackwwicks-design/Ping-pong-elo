<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ping Pong Elo Tournament</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f7fb;
  height: 100vh;
  overflow: hidden;
}

.container {
  display: flex;
  height: 100vh;
  gap: 20px;
  padding: 20px;
  box-sizing: border-box;
}

.panel {
  background: white;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left {
  width: 40%;
}

.right {
  width: 60%;
}

.section {
  margin-bottom: 18px;
}

.section h2 {
  margin: 0 0 10px 0;
}

.scrollable {
  overflow-y: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 6px;
  text-align: left;
  font-size: 14px;
}

th {
  background: #f0f2f7;
}

tr:nth-child(even) {
  background: #fafbff;
}

.rank-1 {
  background: linear-gradient(90deg, gold, #fff8dc);
  font-weight: bold;
}

.rank-2 {
  background: linear-gradient(90deg, silver, #f8f8f8);
}

.rank-3 {
  background: linear-gradient(90deg, #cd7f32, #fdf6e3);
}

button {
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #4c6ef5;
  color: white;
}

button.small {
  padding: 4px 8px;
  font-size: 12px;
}

button.danger {
  background: #e03131;
}

input, select {
  padding: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.match-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  font-size: 14px;
}

.stat-box {
  background: #f0f2f7;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">

  <div class="panel left">

    <div class="section">
      <h2>Leaderboard</h2>
      <div class="scrollable" style="max-height: 300px;">
        <table id="leaderboardTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Rating</th>
              <th>W</th>
              <th>L</th>
              <th>GP</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <input id="playerName" placeholder="Player name">
      <button onclick="addPlayer()">Add Player</button>
      <button class="danger" onclick="resetTournament()">Reset Tournament</button>
    </div>

    <div class="section">
      <h2>Stats</h2>
      <div id="stats"></div>
    </div>

  </div>

  <div class="panel right">

    <div class="section">
      <h2>Add Match</h2>
      <select id="p1"></select>
      <input id="s1" type="number" placeholder="Score">
      <select id="p2"></select>
      <input id="s2" type="number" placeholder="Score">
      <button onclick="addMatch()">Add</button>
    </div>

    <div class="section">
      <h2>Suggested Matches</h2>
      <div id="suggestions" class="scrollable" style="max-height: 180px;"></div>
    </div>

    <div class="section">
      <h2>Match History</h2>
      <div id="history" class="scrollable" style="max-height: 280px;"></div>
    </div>

  </div>
</div>

<script>
let players = [];
let matches = [];
let suggestions = [];

function addPlayer() {
  const nameInput = document.getElementById("playerName");
  const name = nameInput.value.trim();
  if (!name) return;

  players.push({
    id: crypto.randomUUID(),
    name,
    rating: 1000,
    games: 0,
    wins: 0,
    losses: 0
  });

  nameInput.value = "";
  recalcStats();
  render();
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  matches = matches.filter(m => m.player1Id !== id && m.player2Id !== id);
  recalcStats();
  render();
}

function addMatch(p1Id, p2Id, score1, score2) {
  if (!p1Id) {
    p1Id = document.getElementById("p1").value;
    p2Id = document.getElementById("p2").value;
    score1 = parseInt(document.getElementById("s1").value);
    score2 = parseInt(document.getElementById("s2").value);
  }

  if (p1Id === p2Id) return;
  if (isNaN(score1) || isNaN(score2)) return;

  matches.push({
    id: crypto.randomUUID(),
    player1Id: p1Id,
    player2Id: p2Id,
    score1,
    score2
  });

  recalcStats();
  render();
}

function deleteMatch(id) {
  matches = matches.filter(m => m.id !== id);
  recalcStats();
  render();
}

function resetTournament() {
  if (!confirm("Are you sure? This will delete all matches and reset ratings.")) return;

  matches = [];
  players.forEach(p => {
    p.rating = 1000;
    p.games = 0;
    p.wins = 0;
    p.losses = 0;
  });

  render();
}

function getK(player) {
  if (player.games < 5) return 40;
  if (player.games < 10) return 30;
  return 20;
}

function recalcStats() {
  players.forEach(p => {
    p.rating = 1000;
    p.games = 0;
    p.wins = 0;
    p.losses = 0;
  });

  matches.forEach(m => {
    const p1 = players.find(p => p.id === m.player1Id);
    const p2 = players.find(p => p.id === m.player2Id);
    if (!p1 || !p2) return;

    const expected1 = 1 / (1 + Math.pow(10, (p2.rating - p1.rating) / 400));
    const expected2 = 1 - expected1;

    const result1 = m.score1 > m.score2 ? 1 : 0;
    const result2 = 1 - result1;

    const k1 = getK(p1);
    const k2 = getK(p2);

    p1.rating += k1 * (result1 - expected1);
    p2.rating += k2 * (result2 - expected2);

    p1.games++;
    p2.games++;

    if (result1 === 1) {
      p1.wins++;
      p2.losses++;
    } else {
      p2.wins++;
      p1.losses++;
    }
  });
}

function render() {
  renderLeaderboard();
  renderDropdowns();
  renderHistory();
  generateSuggestions();
  renderSuggestions();
  renderStats();
}

function renderLeaderboard() {
  const tbody = document.querySelector("#leaderboardTable tbody");
  tbody.innerHTML = "";

  const sorted = [...players].sort((a,b) => b.rating - a.rating);

  sorted.forEach((p, index) => {
    const tr = document.createElement("tr");
    if (index === 0) tr.className = "rank-1";
    if (index === 1) tr.className = "rank-2";
    if (index === 2) tr.className = "rank-3";

    tr.innerHTML = `
      <td>${index+1}</td>
      <td>${p.name}</td>
      <td>${Math.round(p.rating)}</td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
      <td>${p.games}</td>
      <td><button class="small danger" onclick="removePlayer('${p.id}')">X</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function renderDropdowns() {
  const p1 = document.getElementById("p1");
  const p2 = document.getElementById("p2");
  p1.innerHTML = "";
  p2.innerHTML = "";

  players.forEach(p => {
    const o1 = document.createElement("option");
    o1.value = p.id;
    o1.textContent = p.name;
    p1.appendChild(o1);

    const o2 = document.createElement("option");
    o2.value = p.id;
    o2.textContent = p.name;
    p2.appendChild(o2);
  });
}

function renderHistory() {
  const historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "";

  matches.forEach(m => {
    const p1 = players.find(p => p.id === m.player1Id);
    const p2 = players.find(p => p.id === m.player2Id);
    if (!p1 || !p2) return;

    const row = document.createElement("div");
    row.className = "match-row";
    row.innerHTML = `
      ${p1.name} ${m.score1} - ${m.score2} ${p2.name}
      <button class="small danger" onclick="deleteMatch('${m.id}')">Delete</button>
    `;
    historyDiv.appendChild(row);
  });
}

function generateSuggestions() {
  suggestions = [];
  if (players.length < 2) return;

  const shuffled = [...players].sort(() => Math.random() - 0.5);

  for (let i = 0; i < shuffled.length - 1 && suggestions.length < 4; i++) {
    const p1 = shuffled[i];
    for (let j = i+1; j < shuffled.length; j++) {
      const p2 = shuffled[j];
      const alreadyPlayed = matches.some(m =>
        (m.player1Id === p1.id && m.player2Id === p2.id) ||
        (m.player1Id === p2.id && m.player2Id === p1.id)
      );
      if (!alreadyPlayed) {
        suggestions.push({
          id: crypto.randomUUID(),
          p1Id: p1.id,
          p2Id: p2.id
        });
        break;
      }
    }
  }
}

function renderSuggestions() {
  const div = document.getElementById("suggestions");
  div.innerHTML = "";

  suggestions.forEach(s => {
    const p1 = players.find(p => p.id === s.p1Id);
    const p2 = players.find(p => p.id === s.p2Id);
    if (!p1 || !p2) return;

    const row = document.createElement("div");
    row.className = "match-row";
    row.innerHTML = `
      ${p1.name}
      <input type="number" id="sug1-${s.id}" style="width:50px">
      -
      <input type="number" id="sug2-${s.id}" style="width:50px">
      ${p2.name}
      <button class="small" onclick="addMatch('${p1.id}','${p2.id}', parseInt(document.getElementById('sug1-${s.id}').value), parseInt(document.getElementById('sug2-${s.id}').value))">✔</button>
      <button class="small danger" onclick="removeSuggestion('${s.id}')">X</button>
    `;
    div.appendChild(row);
  });
}

function removeSuggestion(id) {
  suggestions = suggestions.filter(s => s.id !== id);
  renderSuggestions();
}

function renderStats() {
  const stats = document.getElementById("stats");
  stats.innerHTML = "";

  if (players.length === 0) return;

  const totalMatches = matches.length;
  const highest = [...players].sort((a,b)=>b.rating-a.rating)[0];
  const mostWins = [...players].sort((a,b)=>b.wins-a.wins)[0];

  stats.innerHTML = `
    <div class="stat-box">Total Matches: ${totalMatches}</div>
    <div class="stat-box">Top Rated: ${highest.name} (${Math.round(highest.rating)})</div>
    <div class="stat-box">Most Wins: ${mostWins.name} (${mostWins.wins})</div>
  `;
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ping Pong Tournament</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6fa;
  height: 100vh;
  overflow: hidden;
}

.container {
  display: flex;
  height: 100%;
  padding: 20px;
  gap: 20px;
  box-sizing: border-box;
}

.panel {
  background: white;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left { flex: 1; }
.right { flex: 1.2; }

h2 { margin-top: 0; }

button {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

.danger { background: #e74c3c; color: white; }
.secondary { background: #bdc3c7; }
.primary { background: #3498db; color: white; }
.retire { background: #7f8c8d; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 6px;
  text-align: center;
}

th {
  background: #f0f2f7;
}

tr:nth-child(even) { background: #fafbff; }

.rank1 { background: linear-gradient(90deg,#fff8dc,#fff3b0); font-weight: bold; }
.rank2 { background: linear-gradient(90deg,#f0f0f0,#e6e6e6); font-weight: bold; }
.rank3 { background: linear-gradient(90deg,#ffe5cc,#ffd1a3); font-weight: bold; }

.retired-row {
  opacity: 0.4;
}

.scroll {
  overflow-y: auto;
  flex: 1;
}

.section {
  margin-bottom: 20px;
}

.match-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px;
  margin-bottom: 6px;
  background: #f7f9ff;
  border-radius: 6px;
}

input[type=number] {
  width: 50px;
}
</style>
</head>
<body>

<div class="container">

<div class="panel left">
<h2>Leaderboard</h2>

<div class="section">
<input id="playerName" placeholder="Player name">
<button class="primary" onclick="addPlayer()">Add</button>
<button class="danger" onclick="resetTournament()">Reset</button>
</div>

<div class="scroll">
<table>
<thead>
<tr>
<th>#</th><th>Name</th><th>ELO</th><th>GP</th><th>W</th><th>L</th><th></th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</div>
</div>

<div class="panel right">

<div class="section">
<h2>Manual Match</h2>
<select id="p1"></select>
<input id="s1" type="number" min="0">
<select id="p2"></select>
<input id="s2" type="number" min="0">
<button class="primary" onclick="addMatch()">Add Match</button>
</div>

<div class="section">
<h2>Suggested Matches</h2>
<div id="suggestions" class="scroll"></div>
</div>

<div class="section">
<h2>Match History</h2>
<div id="history" class="scroll"></div>
</div>

</div>
</div>

<script>
const START_RATING = 1000

let players = []
let matches = []
let suggestions = []

function save() {
  localStorage.setItem("pingpong", JSON.stringify({players,matches,suggestions}))
}

function load() {
  const data = localStorage.getItem("pingpong")
  if (data) {
    const parsed = JSON.parse(data)
    players = parsed.players || []
    matches = parsed.matches || []
    suggestions = parsed.suggestions || []
  }
}

function recalcStats() {
  players.forEach(p=>{
    p.rating = START_RATING
    p.games = 0
    p.wins = 0
  })

  matches.forEach(m=>{
    const p1 = players.find(p=>p.id===m.player1Id)
    const p2 = players.find(p=>p.id===m.player2Id)
    if(!p1||!p2) return

    const K1 = p1.games < 5 ? 40 : p1.games < 15 ? 30 : 20
    const K2 = p2.games < 5 ? 40 : p2.games < 15 ? 30 : 20

    const expected1 = 1/(1+Math.pow(10,(p2.rating-p1.rating)/400))
    const expected2 = 1-expected1

    const actual1 = m.score1>m.score2?1:0
    const actual2 = 1-actual1

    p1.rating += K1*(actual1-expected1)
    p2.rating += K2*(actual2-expected2)

    p1.games++
    p2.games++
    if(actual1) p1.wins++
    if(actual2) p2.wins++
  })
}

function renderLeaderboard() {
  const tbody = document.getElementById("leaderboard")
  tbody.innerHTML=""

  const active = players.filter(p=>!p.retired)
  const retired = players.filter(p=>p.retired)

  active.sort((a,b)=>b.rating-a.rating)

  const ordered = [...active,...retired]

  ordered.forEach((p,i)=>{
    const tr=document.createElement("tr")
    if(i===0) tr.classList.add("rank1")
    if(i===1) tr.classList.add("rank2")
    if(i===2) tr.classList.add("rank3")
    if(p.retired) tr.classList.add("retired-row")

    const losses = p.games-p.wins

    tr.innerHTML=`
    <td>${i+1}</td>
    <td>${p.name}</td>
    <td>${Math.round(p.rating)}</td>
    <td>${p.games}</td>
    <td>${p.wins}</td>
    <td>${losses}</td>
    <td>
      <button class="retire" onclick="toggleRetire('${p.id}')">${p.retired?"Unretire":"Retire"}</button>
      <button class="danger" onclick="removePlayer('${p.id}')">X</button>
    </td>`
    tbody.appendChild(tr)
  })
}

function renderDropdowns() {
  const selects=[document.getElementById("p1"),document.getElementById("p2")]
  selects.forEach(sel=>{
    const val=sel.value
    sel.innerHTML=""
    players.filter(p=>!p.retired).forEach(p=>{
      const opt=document.createElement("option")
      opt.value=p.id
      opt.textContent=p.name
      sel.appendChild(opt)
    })
    sel.value=val
  })
}

function renderHistory() {
  const div=document.getElementById("history")
  div.innerHTML=""
  matches.forEach(m=>{
    const p1=players.find(p=>p.id===m.player1Id)
    const p2=players.find(p=>p.id===m.player2Id)
    if(!p1||!p2) return

    const row=document.createElement("div")
    row.className="match-card"
    row.innerHTML=`
      <div>${p1.name} ${m.score1} - ${m.score2} ${p2.name}</div>
      <button class="danger" onclick="deleteMatch('${m.id}')">Delete</button>`
    div.appendChild(row)
  })
}

function renderSuggestions() {
  const div=document.getElementById("suggestions")
  div.innerHTML=""

  refillSuggestions()

  suggestions.forEach(s=>{
    const p1=players.find(p=>p.id===s.player1Id)
    const p2=players.find(p=>p.id===s.player2Id)
    if(!p1||!p2||p1.retired||p2.retired) return

    const row=document.createElement("div")
    row.className="match-card"
    row.innerHTML=`
      <div>${p1.name} <input type="number" min="0" id="s1_${s.id}"> -
      <input type="number" min="0" id="s2_${s.id}"> ${p2.name}</div>
      <div>
      <button class="primary" onclick="playSuggestion('${s.id}')">✓</button>
      <button class="secondary" onclick="removeSuggestion('${s.id}')">✕</button>
      </div>`
    div.appendChild(row)
  })
}

function refillSuggestions() {
  suggestions = suggestions.filter(s=>{
    const p1=players.find(p=>p.id===s.player1Id)
    const p2=players.find(p=>p.id===s.player2Id)
    return p1 && p2 && !p1.retired && !p2.retired
  })

  while(suggestions.length<4){
    const active=players.filter(p=>!p.retired)
    if(active.length<2) break

    const p1=active[Math.floor(Math.random()*active.length)]
    let p2=active[Math.floor(Math.random()*active.length)]
    if(p1.id===p2.id) continue

    suggestions.push({
      id:crypto.randomUUID(),
      player1Id:p1.id,
      player2Id:p2.id
    })
  }
}

function render() {
  recalcStats()
  renderLeaderboard()
  renderDropdowns()
  renderHistory()
  renderSuggestions()
  save()
}

function addPlayer(){
  const name=document.getElementById("playerName").value.trim()
  if(!name) return
  players.push({id:crypto.randomUUID(),name,rating:START_RATING,games:0,wins:0,retired:false})
  document.getElementById("playerName").value=""
  render()
}

function removePlayer(id){
  players=players.filter(p=>p.id!==id)
  matches=matches.filter(m=>m.player1Id!==id && m.player2Id!==id)
  suggestions=suggestions.filter(s=>s.player1Id!==id && s.player2Id!==id)
  render()
}

function toggleRetire(id){
  const p=players.find(p=>p.id===id)
  if(!p) return
  p.retired=!p.retired
  render()
}

function addMatch(){
  const p1=document.getElementById("p1").value
  const p2=document.getElementById("p2").value
  const s1=parseInt(document.getElementById("s1").value)
  const s2=parseInt(document.getElementById("s2").value)
  if(!p1||!p2||p1===p2||isNaN(s1)||isNaN(s2)) return

  matches.push({id:crypto.randomUUID(),player1Id:p1,player2Id:p2,score1:s1,score2:s2})
  document.getElementById("s1").value=""
  document.getElementById("s2").value=""
  render()
}

function deleteMatch(id){
  matches=matches.filter(m=>m.id!==id)
  render()
}

function playSuggestion(id){
  const s=suggestions.find(x=>x.id===id)
  if(!s) return
  const s1=parseInt(document.getElementById("s1_"+id).value)
  const s2=parseInt(document.getElementById("s2_"+id).value)
  if(isNaN(s1)||isNaN(s2)) return
  matches.push({id:crypto.randomUUID(),player1Id:s.player1Id,player2Id:s.player2Id,score1:s1,score2:s2})
  suggestions=suggestions.filter(x=>x.id!==id)
  render()
}

function removeSuggestion(id){
  suggestions=suggestions.filter(x=>x.id!==id)
  render()
}

function resetTournament(){
  if(confirm("Are you sure? This will delete all matches and reset ratings.")){
    matches=[]
    suggestions=[]
    players.forEach(p=>{
      p.rating=START_RATING
      p.games=0
      p.wins=0
    })
    render()
  }
}

load()
render()
</script>

</body>
</html>

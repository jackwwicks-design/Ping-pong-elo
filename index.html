<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏓 Table Tennis Ladder</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #eef2f7;
}

h1 {
  margin: 20px;
}

.dashboard {
  display: grid;
  grid-template-columns: 320px 1fr 420px;
  gap: 20px;
  padding: 0 20px 20px 20px;
  height: calc(100vh - 80px);
}

.card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  padding: 15px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.card h2 {
  margin-top: 0;
}

.scroll {
  overflow-y: auto;
}

button {
  background: #1f7aec;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

button:hover { opacity: 0.9; }

button.danger { background: #e74c3c; }
button.secondary { background: #777; }

input, select {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ddd;
  margin: 3px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

.rank-1 { font-weight: bold; color: gold; }
.rank-2 { font-weight: bold; color: silver; }
.rank-3 { font-weight: bold; color: #cd7f32; }

.suggestion {
  background: #f7f9fc;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.player-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
</style>
</head>
<body>

<h1>🏓 Table Tennis Ladder</h1>

<div class="dashboard">

  <!-- LEFT COLUMN -->
  <div class="card">
    <h2>Players</h2>

    <input id="playerName" placeholder="New player name">
    <button onclick="addPlayer()">Add Player</button>

    <div class="scroll" style="margin-top:10px;">
      <div id="playerList"></div>
    </div>
  </div>

  <!-- CENTER COLUMN -->
  <div class="card">
    <h2>Rankings</h2>
    <div class="scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Rating</th>
            <th>G</th>
            <th>W</th>
            <th>L</th>
          </tr>
        </thead>
        <tbody id="rankingTable"></tbody>
      </table>
    </div>

    <h2 style="margin-top:20px;">Manual Match</h2>
    <select id="player1"></select>
    <input id="score1" type="number" placeholder="Score">
    <select id="player2"></select>
    <input id="score2" type="number" placeholder="Score">
    <button onclick="recordManualMatch()">Submit</button>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="card">
    <h2>Suggested Matches</h2>
    <div class="scroll" id="suggestions"></div>

    <h2 style="margin-top:15px;">Match History</h2>
    <div class="scroll" style="max-height:300px;">
      <table>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>

let players = JSON.parse(localStorage.getItem("players")) || [];
let matches = JSON.parse(localStorage.getItem("matches")) || [];

const K = 32;

function save(){
  localStorage.setItem("players",JSON.stringify(players));
  localStorage.setItem("matches",JSON.stringify(matches));
}

function addPlayer(){
  const name=playerName.value.trim();
  if(!name)return;
  players.push({name,rating:1000,wins:0,losses:0,games:0});
  playerName.value="";
  save();
  updateAll();
}

function removePlayer(name){
  if(!confirm("Remove "+name+" and all their matches?"))return;
  players=players.filter(p=>p.name!==name);
  matches=matches.filter(m=>m.p1!==name && m.p2!==name);
  save();
  updateAll();
}

function expected(r1,r2){
  return 1/(1+Math.pow(10,(r2-r1)/400));
}

function recalc(){
  players.forEach(p=>{
    p.rating=1000;p.wins=0;p.losses=0;p.games=0;
  });

  matches.forEach(m=>{
    const p1=players.find(p=>p.name===m.p1);
    const p2=players.find(p=>p.name===m.p2);
    if(!p1||!p2)return;

    const e1=expected(p1.rating,p2.rating);
    const e2=expected(p2.rating,p1.rating);

    if(m.s1>m.s2){
      p1.rating+=K*(1-e1);
      p2.rating+=K*(0-e2);
      p1.wins++;p2.losses++;
    } else {
      p2.rating+=K*(1-e2);
      p1.rating+=K*(0-e1);
      p2.wins++;p1.losses++;
    }

    p1.games++;p2.games++;
  });
}

function recordManualMatch(){
  const p1=players[player1.value];
  const p2=players[player2.value];
  const s1=parseInt(score1.value);
  const s2=parseInt(score2.value);
  if(p1===p2||isNaN(s1)||isNaN(s2))return;
  matches.push({p1:p1.name,p2:p2.name,s1,s2});
  save();
  updateAll();
}

function updateRankings(){
  recalc();
  players.sort((a,b)=>b.rating-a.rating);
  rankingTable.innerHTML="";
  players.forEach((p,i)=>{
    let cls="";
    if(i===0)cls="rank-1";
    if(i===1)cls="rank-2";
    if(i===2)cls="rank-3";
    rankingTable.innerHTML+=`
      <tr class="${cls}">
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${Math.round(p.rating)}</td>
        <td>${p.games}</td>
        <td>${p.wins}</td>
        <td>${p.losses}</td>
      </tr>`;
  });
}

function updateSuggestions(){
  suggestions.innerHTML="";
  if(players.length<2)return;

  let pairs=[];

  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      let p1=players[i];
      let p2=players[j];
      let ratingDiff=Math.abs(p1.rating-p2.rating);
      let gamesDiff=Math.abs(p1.games-p2.games);
      let score=ratingDiff + gamesDiff*50 + Math.random()*200;
      pairs.push({p1,p2,score});
    }
  }

  pairs.sort((a,b)=>a.score-b.score);

  pairs.slice(0,5).forEach(pair=>{
    const key=pair.p1.name+"-"+pair.p2.name;
    suggestions.innerHTML+=`
      <div class="suggestion">
        <div>${pair.p1.name} vs ${pair.p2.name}</div>
        <div>
          <input type="number" id="s1-${key}" style="width:45px">
          <input type="number" id="s2-${key}" style="width:45px">
          <button onclick="recordSuggested('${pair.p1.name}','${pair.p2.name}','${key}')">✓</button>
        </div>
      </div>`;
  });
}

function recordSuggested(p1,p2,key){
  const s1=parseInt(document.getElementById("s1-"+key).value);
  const s2=parseInt(document.getElementById("s2-"+key).value);
  if(isNaN(s1)||isNaN(s2))return;
  matches.push({p1,p2,s1,s2});
  save();
  updateAll();
}

function updateHistory(){
  historyTable.innerHTML="";
  matches.slice().reverse().forEach((m,i)=>{
    historyTable.innerHTML+=`
      <tr>
        <td>${m.p1} vs ${m.p2} (${m.s1}-${m.s2})</td>
      </tr>`;
  });
}

function updatePlayers(){
  playerList.innerHTML="";
  players.forEach(p=>{
    playerList.innerHTML+=`
      <div class="player-row">
        <span>${p.name}</span>
        <button class="danger" onclick="removePlayer('${p.name}')">X</button>
      </div>`;
  });

  player1.innerHTML="";
  player2.innerHTML="";
  players.forEach((p,i)=>{
    player1.innerHTML+=`<option value="${i}">${p.name}</option>`;
    player2.innerHTML+=`<option value="${i}">${p.name}</option>`;
  });
}

function updateAll(){
  updatePlayers();
  updateRankings();
  updateSuggestions();
  updateHistory();
  save();
}

updateAll();

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ping Pong Tournament</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg,#eef2f7,#dfe6f3);
  height: 100vh;
  display: flex;
}

.container {
  display: flex;
  width: 100%;
  padding: 20px;
  gap: 20px;
  box-sizing: border-box;
}

.panel {
  background: white;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left { width: 45%; }
.right { width: 55%; }

h2 { margin: 0 0 12px 0; }

.scrollable { overflow-y: auto; flex: 1; }

button {
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: #4a7cff;
  color: white;
  cursor: pointer;
  font-size: 13px;
}
button:hover { opacity: .9; }
button.danger { background: #e74c3c; }
button.secondary { background: #aaa; }

input, select {
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th {
  text-align: left;
  padding: 6px;
  background: #f3f6fb;
}

td {
  padding: 6px;
  border-bottom: 1px solid #eee;
}

.rank-1 { background: linear-gradient(90deg,#fff7d6,#fff); }
.rank-2 { background: linear-gradient(90deg,#f2f2f2,#fff); }
.rank-3 { background: linear-gradient(90deg,#ffe5cc,#fff); }

.badge {
  font-weight: bold;
  margin-right: 6px;
}

.match-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.stat-box {
  background: #f5f8ff;
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
<div class="panel left">
<h2>Leaderboard</h2>

<div style="display:flex; gap:6px; margin-bottom:10px;">
<input type="text" id="newPlayerName" placeholder="Player name">
<button onclick="addPlayer()">Add</button>
</div>

<div class="scrollable" id="rankings"></div>

<button class="danger" onclick="resetTournament()">Reset Tournament</button>
</div>

<div class="panel right">
<h2>Manual Match</h2>

<div style="display:flex; gap:6px; margin-bottom:12px;">
<select id="player1"></select>
<input type="number" id="score1" placeholder="Score">
<span>vs</span>
<select id="player2"></select>
<input type="number" id="score2" placeholder="Score">
<button onclick="addMatch()">Add</button>
</div>

<h2>Suggested Matches</h2>
<div class="scrollable" style="max-height:160px;" id="suggestions"></div>

<h2>Match History</h2>
<div class="scrollable" style="max-height:220px;" id="history"></div>

<h2>Fun Stats</h2>
<div id="funStats"></div>

</div>
</div>

<script>
let players = [];
let matches = [];
let suggestions = [];

function addPlayer() {
  const name = newPlayerName.value.trim();
  if (!name) return;

  players.push({
    id: crypto.randomUUID(),
    name,
    rating: 1000,
    games: 0,
    wins: 0,
    losses: 0
  });

  newPlayerName.value = "";
  recalcStats();
  render();
}

function removePlayer(id) {
  players = players.filter(p=>p.id!==id);
  matches = matches.filter(m=>m.player1Id!==id && m.player2Id!==id);
  recalcStats();
  render();
}

function addMatchFromSuggestion(p1Id,p2Id,s1,s2){
  matches.push({
    id: crypto.randomUUID(),
    player1Id:p1Id,
    player2Id:p2Id,
    score1:s1,
    score2:s2
  });
  recalcStats();
  generateSuggestions();
  render();
}

function addMatch(){
  const p1=player1.value;
  const p2=player2.value;
  const s1=parseInt(score1.value);
  const s2=parseInt(score2.value);

  if(!p1||!p2||p1===p2) return;
  if(isNaN(s1)||isNaN(s2)) return;

  matches.push({
    id:crypto.randomUUID(),
    player1Id:p1,
    player2Id:p2,
    score1:s1,
    score2:s2
  });

  score1.value="";
  score2.value="";
  recalcStats();
  generateSuggestions();
  render();
}

function deleteMatch(id){
  matches=matches.filter(m=>m.id!==id);
  recalcStats();
  render();
}

function resetTournament(){
  if(!confirm("Are you sure? This will delete all matches and reset ratings."))return;
  matches=[];
  recalcStats();
  render();
}

function recalcStats(){
  players.forEach(p=>{
    p.rating=1000;
    p.games=0;
    p.wins=0;
    p.losses=0;
  });

  const K=20;

  for(const m of matches){
    const p1=players.find(p=>p.id===m.player1Id);
    const p2=players.find(p=>p.id===m.player2Id);
    if(!p1||!p2) continue;

    p1.games++;
    p2.games++;

    const e1=1/(1+Math.pow(10,(p2.rating-p1.rating)/400));
    const e2=1-e1;

    const r1=m.score1>m.score2?1:0;
    const r2=1-r1;

    if(r1) p1.wins++; else p1.losses++;
    if(r2) p2.wins++; else p2.losses++;

    p1.rating+=K*(r1-e1);
    p2.rating+=K*(r2-e2);
  }
}

function render(){
  renderRankings();
  renderDropdowns();
  renderHistory();
  renderSuggestions();
  renderFunStats();
}

function renderRankings(){
  const sorted=[...players].sort((a,b)=>b.rating-a.rating);
  rankings.innerHTML="<table><tr><th>#</th><th>Name</th><th>Rating</th><th>P</th><th>W</th><th>L</th><th>%</th><th></th></tr></table>";
  const table=rankings.querySelector("table");

  sorted.forEach((p,i)=>{
    const row=document.createElement("tr");
    if(i===0) row.classList.add("rank-1");
    if(i===1) row.classList.add("rank-2");
    if(i===2) row.classList.add("rank-3");

    const winPct=p.games?((p.wins/p.games)*100).toFixed(0):0;

    row.innerHTML=`
      <td>${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td>
      <td>${p.name}</td>
      <td>${Math.round(p.rating)}</td>
      <td>${p.games}</td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
      <td>${winPct}%</td>
      <td><button class="danger">X</button></td>
    `;
    row.querySelector("button").onclick=()=>removePlayer(p.id);
    table.appendChild(row);
  });
}

function renderDropdowns(){
  const s1=player1.value;
  const s2=player2.value;
  player1.innerHTML="";
  player2.innerHTML="";
  players.forEach(p=>{
    const o1=document.createElement("option");
    o1.value=p.id;
    o1.textContent=p.name;
    player1.appendChild(o1);
    const o2=document.createElement("option");
    o2.value=p.id;
    o2.textContent=p.name;
    player2.appendChild(o2);
  });
  if(players.find(p=>p.id===s1)) player1.value=s1;
  if(players.find(p=>p.id===s2)) player2.value=s2;
}

function renderHistory(){
  history.innerHTML="";
  matches.forEach(m=>{
    const p1=players.find(p=>p.id===m.player1Id);
    const p2=players.find(p=>p.id===m.player2Id);
    if(!p1||!p2) return;
    const div=document.createElement("div");
    div.className="match-row";
    div.innerHTML=`
      ${p1.name} ${m.score1} - ${m.score2} ${p2.name}
      <button class="danger">Delete</button>
    `;
    div.querySelector("button").onclick=()=>deleteMatch(m.id);
    history.appendChild(div);
  });
}

function generateSuggestions(){
  suggestions=[];
  if(players.length<2) return;

  const sorted=[...players].sort((a,b)=>b.rating-a.rating);
  const pairCounts={};

  matches.forEach(m=>{
    const key=[m.player1Id,m.player2Id].sort().join("-");
    pairCounts[key]=(pairCounts[key]||0)+1;
  });

  const used={};
  players.forEach(p=>used[p.id]=0);

  let attempts=0;
  while(suggestions.length<4 && attempts<200){
    attempts++;
    const p1=sorted[Math.floor(Math.random()*sorted.length)];
    const p2=sorted[Math.floor(Math.random()*sorted.length)];
    if(p1.id===p2.id) continue;

    const key=[p1.id,p2.id].sort().join("-");
    const gamesTogether=pairCounts[key]||0;
    const ratingDiff=Math.abs(p1.rating-p2.rating);

    if(used[p1.id]>=2||used[p2.id]>=2) continue;
    if(gamesTogether>3) continue;

    suggestions.push({p1,p2});
    used[p1.id]++;
    used[p2.id]++;
  }
}

function renderSuggestions(){
  generateSuggestions();
  suggestionsDiv.innerHTML="";
}

function renderSuggestions(){
  suggestionsDiv = document.getElementById("suggestions");
  suggestionsDiv.innerHTML="";
  suggestions.forEach((s,i)=>{
    const row=document.createElement("div");
    row.className="match-row";
    row.innerHTML=`
      ${s.p1.name}
      <input type="number" id="s1_${i}" style="width:50px">
      -
      <input type="number" id="s2_${i}" style="width:50px">
      ${s.p2.name}
      <button>Record</button>
      <button class="secondary">Dismiss</button>
    `;
    row.querySelector("button").onclick=()=>{
      const sc1=parseInt(document.getElementById(`s1_${i}`).value);
      const sc2=parseInt(document.getElementById(`s2_${i}`).value);
      if(isNaN(sc1)||isNaN(sc2)) return;
      addMatchFromSuggestion(s.p1.id,s.p2.id,sc1,sc2);
    };
    row.querySelectorAll("button")[1].onclick=()=>{
      suggestions.splice(i,1);
      renderSuggestions();
    };
    suggestionsDiv.appendChild(row);
  });
}

function renderFunStats(){
  funStats.innerHTML="";
  if(players.length===0) return;

  const mostWins=[...players].sort((a,b)=>b.wins-a.wins)[0];
  const mostGames=[...players].sort((a,b)=>b.games-a.games)[0];
  const highestRating=[...players].sort((a,b)=>b.rating-a.rating)[0];
  const bestWinPct=[...players]
    .filter(p=>p.games>0)
    .sort((a,b)=>(b.wins/b.games)-(a.wins/a.games))[0];

  funStats.innerHTML=`
    <div class="stat-box">🏆 Highest Rating: ${highestRating?.name} (${Math.round(highestRating?.rating)})</div>
    <div class="stat-box">🔥 Most Wins: ${mostWins?.name} (${mostWins?.wins})</div>
    <div class="stat-box">🎯 Best Win %: ${bestWinPct?bestWinPct.name:"N/A"}</div>
    <div class="stat-box">🎮 Most Active: ${mostGames?.name} (${mostGames?.games} games)</div>
  `;
}

render();
</script>
</body>
</html>

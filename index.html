<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ping Pong Tournament</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  height: 100vh;
  display: flex;
}

.container {
  display: flex;
  width: 100%;
  padding: 20px;
  gap: 20px;
  box-sizing: border-box;
}

.panel {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  padding: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left {
  width: 40%;
}

.right {
  width: 60%;
}

h2 {
  margin-top: 0;
}

.section {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
}

.scrollable {
  overflow-y: auto;
  flex: 1;
}

.player-row, .match-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: #4a7cff;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

button.danger {
  background: #e74c3c;
}

input, select {
  padding: 6px;
  margin-right: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.flex-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}
</style>
</head>
<body>
<div class="container">
  <div class="panel left">
    <h2>Rankings</h2>
    <div class="section flex-row">
      <input type="text" id="newPlayerName" placeholder="Player name">
      <button onclick="addPlayer()">Add</button>
    </div>
    <div class="scrollable" id="rankings"></div>
    <button class="danger" onclick="resetTournament()">Reset Tournament</button>
  </div>

  <div class="panel right">
    <h2>Manual Match Entry</h2>
    <div class="section">
      <div class="flex-row">
        <select id="player1"></select>
        <input type="number" id="score1" placeholder="Score">
        <span>vs</span>
        <select id="player2"></select>
        <input type="number" id="score2" placeholder="Score">
        <button onclick="addMatch()">Add Match</button>
      </div>
    </div>

    <h2>Suggested Matches</h2>
    <div class="section scrollable" id="suggestions"></div>

    <h2>Match History</h2>
    <div class="section scrollable" id="history"></div>
  </div>
</div>

<script>
let players = [];
let matches = [];

function addPlayer() {
  const nameInput = document.getElementById("newPlayerName");
  const name = nameInput.value.trim();
  if (!name) return;

  players.push({
    id: crypto.randomUUID(),
    name,
    rating: 1000,
    games: 0,
    wins: 0
  });

  nameInput.value = "";
  recalcStats();
  render();
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  matches = matches.filter(m => m.player1Id !== id && m.player2Id !== id);
  recalcStats();
  render();
}

function addMatch() {
  const p1 = document.getElementById("player1").value;
  const p2 = document.getElementById("player2").value;
  const s1 = parseInt(document.getElementById("score1").value);
  const s2 = parseInt(document.getElementById("score2").value);

  if (!p1 || !p2 || p1 === p2) return;
  if (isNaN(s1) || isNaN(s2)) return;

  matches.push({
    id: crypto.randomUUID(),
    player1Id: p1,
    player2Id: p2,
    score1: s1,
    score2: s2
  });

  document.getElementById("score1").value = "";
  document.getElementById("score2").value = "";

  recalcStats();
  render();
}

function deleteMatch(id) {
  matches = matches.filter(m => m.id !== id);
  recalcStats();
  render();
}

function resetTournament() {
  if (!confirm("Are you sure? This will delete all matches and reset ratings.")) return;

  matches = [];
  players.forEach(p => {
    p.rating = 1000;
    p.games = 0;
    p.wins = 0;
  });

  render();
}

function recalcStats() {
  players.forEach(p => {
    p.rating = 1000;
    p.games = 0;
    p.wins = 0;
  });

  const K = 20;

  for (let m of matches) {
    const p1 = players.find(p => p.id === m.player1Id);
    const p2 = players.find(p => p.id === m.player2Id);
    if (!p1 || !p2) continue;

    p1.games++;
    p2.games++;

    const expected1 = 1 / (1 + Math.pow(10, (p2.rating - p1.rating) / 400));
    const expected2 = 1 - expected1;

    const result1 = m.score1 > m.score2 ? 1 : 0;
    const result2 = 1 - result1;

    if (result1 === 1) p1.wins++;
    if (result2 === 1) p2.wins++;

    p1.rating += K * (result1 - expected1);
    p2.rating += K * (result2 - expected2);
  }
}

function render() {
  renderRankings();
  renderDropdowns();
  renderHistory();
  renderSuggestions();
}

function renderRankings() {
  const container = document.getElementById("rankings");
  container.innerHTML = "";

  const sorted = [...players].sort((a,b) => b.rating - a.rating);

  sorted.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "player-row";
    row.innerHTML = `
      <div>#${i+1} ${p.name} — ${Math.round(p.rating)} | W:${p.wins} G:${p.games}</div>
      <button class="danger">X</button>
    `;
    row.querySelector("button").onclick = () => removePlayer(p.id);
    container.appendChild(row);
  });
}

function renderDropdowns() {
  const p1 = document.getElementById("player1");
  const p2 = document.getElementById("player2");

  const selected1 = p1.value;
  const selected2 = p2.value;

  p1.innerHTML = "";
  p2.innerHTML = "";

  players.forEach(p => {
    const opt1 = document.createElement("option");
    opt1.value = p.id;
    opt1.textContent = p.name;
    p1.appendChild(opt1);

    const opt2 = document.createElement("option");
    opt2.value = p.id;
    opt2.textContent = p.name;
    p2.appendChild(opt2);
  });

  if (players.find(p => p.id === selected1)) p1.value = selected1;
  if (players.find(p => p.id === selected2)) p2.value = selected2;
}

function renderHistory() {
  const container = document.getElementById("history");
  container.innerHTML = "";

  matches.forEach(m => {
    const p1 = players.find(p => p.id === m.player1Id);
    const p2 = players.find(p => p.id === m.player2Id);
    if (!p1 || !p2) return;

    const row = document.createElement("div");
    row.className = "match-row";
    row.innerHTML = `
      <div>${p1.name} ${m.score1} - ${m.score2} ${p2.name}</div>
      <button class="danger">Delete</button>
    `;
    row.querySelector("button").onclick = () => deleteMatch(m.id);
    container.appendChild(row);
  });
}

function renderSuggestions() {
  const container = document.getElementById("suggestions");
  container.innerHTML = "";

  if (players.length < 2) return;

  const suggestions = generateSuggestions(4);

  suggestions.forEach(pair => {
    const row = document.createElement("div");
    row.className = "match-row";
    row.textContent = `${pair[0].name} vs ${pair[1].name}`;
    container.appendChild(row);
  });
}

function generateSuggestions(count) {
  const pairs = [];
  const usedCounts = {};

  players.forEach(p => usedCounts[p.id] = 0);

  const historyCounts = {};
  matches.forEach(m => {
    const key = [m.player1Id, m.player2Id].sort().join("-");
    historyCounts[key] = (historyCounts[key] || 0) + 1;
  });

  const sorted = [...players].sort((a,b) => b.rating - a.rating);

  let attempts = 0;
  while (pairs.length < count && attempts < 1000) {
    attempts++;

    const p1 = sorted[Math.floor(Math.random()*sorted.length)];
    const p2 = sorted[Math.floor(Math.random()*sorted.length)];
    if (p1.id === p2.id) continue;

    const key = [p1.id, p2.id].sort().join("-");
    const played = historyCounts[key] || 0;

    if (usedCounts[p1.id] >= 2 || usedCounts[p2.id] >= 2) continue;

    const ratingDiff = Math.abs(p1.rating - p2.rating);
    const score = ratingDiff + played * 50 + Math.random()*50;

    pairs.push({pair:[p1,p2],score});
    usedCounts[p1.id]++;
    usedCounts[p2.id]++;
  }

  return pairs.sort((a,b)=>a.score-b.score)
              .slice(0,count)
              .map(p=>p.pair);
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏓 Table Tennis Ladder</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f4f6f9;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

h1 {
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

button {
  background: #1f7aec;
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
}

button:hover { opacity: 0.9; }

button.danger {
  background: #e74c3c;
}

button.secondary {
  background: #888;
}

input, select {
  padding: 7px;
  margin: 5px 5px 5px 0;
  border-radius: 6px;
  border: 1px solid #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 10px;
  background: #f1f3f6;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.rank-1 { font-weight: bold; color: gold; }
.rank-2 { font-weight: bold; color: silver; }
.rank-3 { font-weight: bold; color: #cd7f32; }

.suggestion {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f9fafc;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.suggestion strong {
  font-size: 16px;
}

.history-row:hover {
  background: #fafafa;
}

.section-title {
  margin-bottom: 15px;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="container">

<h1>🏓 Table Tennis Ladder</h1>

<div class="card">
  <div class="section-title">Add Player</div>
  <input id="playerName" placeholder="Player name">
  <button onclick="addPlayer()">Add</button>
</div>

<div class="card">
  <div class="section-title">Suggested Matches</div>
  <div id="suggestions"></div>
</div>

<div class="card">
  <div class="section-title">Manual Match Entry</div>
  <select id="player1"></select>
  <input id="score1" type="number" placeholder="Score">
  <select id="player2"></select>
  <input id="score2" type="number" placeholder="Score">
  <button onclick="recordManualMatch()">Submit</button>
</div>

<div class="card">
  <div class="section-title">Rankings</div>
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Rating</th>
        <th>Games</th>
        <th>W</th>
        <th>L</th>
      </tr>
    </thead>
    <tbody id="rankingTable"></tbody>
  </table>
</div>

<div class="card">
  <div class="section-title">Match History</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Match</th>
        <th>Score</th>
        <th>Edit</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</div>

</div>

<script>

let players = JSON.parse(localStorage.getItem("players")) || [];
let matches = JSON.parse(localStorage.getItem("matches")) || [];
let dismissed = JSON.parse(localStorage.getItem("dismissed")) || [];

const K = 32;

function save() {
  localStorage.setItem("players", JSON.stringify(players));
  localStorage.setItem("matches", JSON.stringify(matches));
  localStorage.setItem("dismissed", JSON.stringify(dismissed));
}

function addPlayer() {
  const name = document.getElementById("playerName").value.trim();
  if (!name) return;

  players.push({ name, rating:1000, wins:0, losses:0, games:0 });
  document.getElementById("playerName").value="";
  save();
  updateAll();
}

function expected(r1,r2){
  return 1/(1+Math.pow(10,(r2-r1)/400));
}

function recalcRatings(){
  players.forEach(p=>{
    p.rating=1000; p.wins=0; p.losses=0; p.games=0;
  });

  matches.forEach(m=>{
    const p1=players.find(p=>p.name===m.p1);
    const p2=players.find(p=>p.name===m.p2);

    const e1=expected(p1.rating,p2.rating);
    const e2=expected(p2.rating,p1.rating);

    if(m.s1>m.s2){
      p1.rating+=K*(1-e1);
      p2.rating+=K*(0-e2);
      p1.wins++; p2.losses++;
    } else {
      p2.rating+=K*(1-e2);
      p1.rating+=K*(0-e1);
      p2.wins++; p1.losses++;
    }

    p1.games++; p2.games++;
  });
}

function recordManualMatch(){
  const p1=players[player1.value];
  const p2=players[player2.value];
  const s1=parseInt(score1.value);
  const s2=parseInt(score2.value);
  if(p1===p2||isNaN(s1)||isNaN(s2))return;
  matches.push({p1:p1.name,p2:p2.name,s1,s2});
  dismissed=[];
  save();
  updateAll();
}

function recordSuggestedMatch(p1,p2,s1,s2){
  if(isNaN(s1)||isNaN(s2))return;
  matches.push({p1,p2,s1,s2});
  dismissed=[];
  save();
  updateAll();
}

function deleteMatch(i){
  matches.splice(i,1);
  save();
  updateAll();
}

function editMatch(i){
  const m=matches[i];
  const s1=prompt("Score for "+m.p1,m.s1);
  const s2=prompt("Score for "+m.p2,m.s2);
  if(s1===null||s2===null)return;
  m.s1=parseInt(s1);
  m.s2=parseInt(s2);
  save();
  updateAll();
}

function updateRankings(){
  recalcRatings();
  players.sort((a,b)=>b.rating-a.rating);
  rankingTable.innerHTML="";
  players.forEach((p,i)=>{
    let rankClass="";
    if(i===0)rankClass="rank-1";
    if(i===1)rankClass="rank-2";
    if(i===2)rankClass="rank-3";

    rankingTable.innerHTML+=`
      <tr class="${rankClass}">
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${Math.round(p.rating)}</td>
        <td>${p.games}</td>
        <td>${p.wins}</td>
        <td>${p.losses}</td>
      </tr>`;
  });
}

function updateDropdowns(){
  player1.innerHTML="";
  player2.innerHTML="";
  players.forEach((p,i)=>{
    player1.innerHTML+=`<option value="${i}">${p.name}</option>`;
    player2.innerHTML+=`<option value="${i}">${p.name}</option>`;
  });
}

function updateHistory(){
  historyTable.innerHTML="";
  matches.forEach((m,i)=>{
    historyTable.innerHTML+=`
      <tr class="history-row">
        <td>${i+1}</td>
        <td>${m.p1} vs ${m.p2}</td>
        <td>${m.s1}-${m.s2}</td>
        <td><button onclick="editMatch(${i})" class="secondary">Edit</button></td>
        <td><button onclick="deleteMatch(${i})" class="danger">X</button></td>
      </tr>`;
  });
}

function updateSuggestions(){
  suggestions.innerHTML="";
  if(players.length<2)return;

  let possible=[];

  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      const p1=players[i];
      const p2=players[j];
      const ratingDiff=Math.abs(p1.rating-p2.rating);
      const gamesDiff=Math.abs(p1.games-p2.games);

      let score = ratingDiff + gamesDiff*50;

      score += Math.random()*150; // 🎲 randomness

      possible.push({p1,p2,score});
    }
  }

  possible.sort((a,b)=>a.score-b.score);

  possible.slice(0,5).forEach(pair=>{
    const key=pair.p1.name+"-"+pair.p2.name;

    suggestions.innerHTML+=`
      <div class="suggestion">
        <div>
          <strong>${pair.p1.name}</strong> vs <strong>${pair.p2.name}</strong>
        </div>
        <div>
          <input type="number" id="s1-${key}" placeholder="Score">
          <input type="number" id="s2-${key}" placeholder="Score">
          <button onclick="recordSuggestedMatch('${pair.p1.name}','${pair.p2.name}',
            parseInt(document.getElementById('s1-${key}').value),
            parseInt(document.getElementById('s2-${key}').value))">
            ✓
          </button>
        </div>
      </div>`;
  });
}

function updateAll(){
  updateDropdowns();
  updateRankings();
  updateHistory();
  updateSuggestions();
  save();
}

updateAll();

</script>

</body>
</html>

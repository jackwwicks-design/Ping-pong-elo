<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ping Pong Tournament</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

h2 {
    margin-top: 0;
}

.container {
    display: grid;
    grid-template-columns: 45% 55%;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    gap: 20px;
}

.panel {
    background: white;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.rankings-list {
    overflow-y: auto;
    flex-grow: 1;
}

.player-row {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

.player-row span {
    font-size: 14px;
}

button {
    cursor: pointer;
    border: none;
    padding: 6px 10px;
    border-radius: 5px;
    font-size: 13px;
}

button.primary {
    background: #2d89ef;
    color: white;
}

button.danger {
    background: #e74c3c;
    color: white;
}

button.small {
    font-size: 12px;
    padding: 4px 6px;
}

input, select {
    padding: 5px;
    margin: 3px;
}

.match-history {
    overflow-y: auto;
    max-height: 40%;
    border-top: 1px solid #ddd;
    margin-top: 10px;
    padding-top: 10px;
}

.match-row {
    font-size: 13px;
    margin-bottom: 6px;
}
</style>
</head>
<body>

<div class="container">

    <!-- LEFT: Rankings + Player Management -->
    <div class="panel">
        <h2>Rankings</h2>

        <div>
            <input id="newPlayerName" placeholder="Player name">
            <button class="primary" onclick="addPlayer()">Add</button>
        </div>

        <div class="rankings-list" id="rankings"></div>

        <button class="danger" onclick="resetTournament()">Reset Tournament</button>
    </div>

    <!-- RIGHT: Match Entry + History -->
    <div class="panel">
        <h2>Record Match</h2>

        <div>
            <select id="player1"></select>
            <input id="score1" type="number" placeholder="Score">
        </div>

        <div>
            <select id="player2"></select>
            <input id="score2" type="number" placeholder="Score">
        </div>

        <button class="primary" onclick="recordMatch()">Add Match</button>

        <div class="match-history">
            <h3>Match History</h3>
            <div id="history"></div>
        </div>
    </div>

</div>

<script>
let players = [];
let matches = [];

function createPlayer(name) {
    return {
        id: crypto.randomUUID(),
        name: name,
        rating: 1000,
        games: 0,
        wins: 0
    };
}

function addPlayer() {
    const nameInput = document.getElementById("newPlayerName");
    const name = nameInput.value.trim();
    if (!name) return;

    players.push(createPlayer(name));
    nameInput.value = "";
    render();
}

function removePlayer(id) {
    players = players.filter(p => p.id !== id);
    matches = matches.filter(m => m.player1Id !== id && m.player2Id !== id);
    recalculateStats();
    render();
}

function recordMatch() {
    const p1Id = document.getElementById("player1").value;
    const p2Id = document.getElementById("player2").value;
    const s1 = parseInt(document.getElementById("score1").value);
    const s2 = parseInt(document.getElementById("score2").value);

    if (!p1Id || !p2Id) return;
    if (p1Id === p2Id) {
        alert("Player cannot play themselves.");
        return;
    }
    if (isNaN(s1) || isNaN(s2)) return;

    matches.push({
        id: crypto.randomUUID(),
        player1Id: p1Id,
        player2Id: p2Id,
        score1: s1,
        score2: s2
    });

    document.getElementById("score1").value = "";
    document.getElementById("score2").value = "";

    recalculateStats();
    render();
}

function deleteMatch(id) {
    matches = matches.filter(m => m.id !== id);
    recalculateStats();
    render();
}

function recalculateStats() {
    players.forEach(p => {
        p.rating = 1000;
        p.games = 0;
        p.wins = 0;
    });

    matches.forEach(match => {
        const p1 = players.find(p => p.id === match.player1Id);
        const p2 = players.find(p => p.id === match.player2Id);
        if (!p1 || !p2) return;

        p1.games++;
        p2.games++;

        let k = 20;
        let expected1 = 1 / (1 + Math.pow(10, (p2.rating - p1.rating) / 400));
        let expected2 = 1 - expected1;

        let actual1 = match.score1 > match.score2 ? 1 : 0;
        let actual2 = 1 - actual1;

        if (actual1 === 1) p1.wins++;
        else p2.wins++;

        p1.rating += k * (actual1 - expected1);
        p2.rating += k * (actual2 - expected2);
    });
}

function resetTournament() {
    if (!confirm("Are you sure? This will delete all matches and reset ratings.")) return;

    matches = [];
    recalculateStats();
    render();
}

function render() {
    // Sort for display only
    const sorted = [...players].sort((a,b) => b.rating - a.rating);

    const rankingsDiv = document.getElementById("rankings");
    rankingsDiv.innerHTML = "";

    sorted.forEach((p, index) => {
        const div = document.createElement("div");
        div.className = "player-row";
        div.innerHTML = `
            <span>
                ${index+1}. ${p.name}
                | Rating: ${p.rating.toFixed(0)}
                | W: ${p.wins}
                | G: ${p.games}
            </span>
            <button class="danger small" onclick="removePlayer('${p.id}')">X</button>
        `;
        rankingsDiv.appendChild(div);
    });

    // Update dropdowns
    const p1Select = document.getElementById("player1");
    const p2Select = document.getElementById("player2");
    p1Select.innerHTML = "";
    p2Select.innerHTML = "";

    players.forEach(p => {
        p1Select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        p2Select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });

    // History
    const historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    matches.forEach(match => {
        const p1 = players.find(p => p.id === match.player1Id);
        const p2 = players.find(p => p.id === match.player2Id);
        if (!p1 || !p2) return;

        const row = document.createElement("div");
        row.className = "match-row";
        row.innerHTML = `
            ${p1.name} ${match.score1} - ${match.score2} ${p2.name}
            <button class="danger small" onclick="deleteMatch('${match.id}')">Delete</button>
        `;
        historyDiv.appendChild(row);
    });
}

render();
</script>

</body>
</html>
